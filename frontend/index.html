<!DOCTYPE html>
<html>
<head>
<title>AWS AI Feedback Hub</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(120deg,#0f172a,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:400px;
  padding:25px;
  background: rgba(255,255,255,0.05);
  border-radius:15px;
}

input, textarea {
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
}

button {
  width:100%;
  padding:10px;
  background:#3b82f6;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>AI Feedback Hub</h2>

<form id="form">
<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>
<textarea id="message" placeholder="Message" required></textarea>
<button>Submit</button>
</form>

<p id="status"></p>
</div>

<script>
const API_URL = "https://d5bq71akh5.execute-api.us-east-1.amazonaws.com/feedback";

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  // ✅ FIX: always use getElementById (safe + reliable)
  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    message: document.getElementById("message").value.trim()
  };

  console.log("SENDING:", data);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const text = await res.text(); // IMPORTANT for debugging
    console.log("RAW RESPONSE:", text);

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      throw new Error("Invalid JSON from backend");
    }

    document.getElementById("status").innerText =
      res.ok
        ? "✅ Submitted successfully!"
        : "❌ " + (result.error || "Server error");

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "❌ Network/API error";
  }
});
</script>

</body>
</html>
